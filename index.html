<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src * data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src *;">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AG Browser</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-theme="dark">
  <div class="window-frame">
    <div class="window-frame__brand">
      <span class="window-frame__dot"></span>
      <span class="window-frame__title">AG Browser</span>
    </div>
    <div class="window-controls" aria-label="Window controls">
      <button id="btnMinimizeWindow" class="window-control" type="button" aria-label="Minimize window">
        <span class="window-control-icon icon-minimize"></span>
      </button>
      <button id="btnToggleMaximizeWindow" class="window-control" type="button" aria-label="Maximize window">
        <span class="window-control-icon icon-maximize"></span>
      </button>
      <button id="btnCloseWindow" class="window-control window-control-close" type="button" aria-label="Close window">
        <span class="window-control-icon icon-close"></span>
      </button>
    </div>
  </div>

  <div class="top">
    <div class="tabs" id="tabs"></div>
    <div class="toolbar">
      <div class="nav-buttons">
        <button id="btnBack" title="Back">&#x2190;</button>
        <button id="btnFwd" title="Forward">&#x2192;</button>
        <button id="btnReload" title="Reload">&#x21BB;</button>
      </div>
      <input id="address" type="text" spellcheck="false" placeholder="" />
      <div class="right-buttons">
        <button id="btnDownloads" title="Downloads">&#x2193;</button>
        <button id="btnExtensions" title="Extensions">&#x2699;</button>
        <button id="btnSettings" title="Settings">&#x2630;</button>
        <button id="btnNew" class="btn-new" title="New tab">&#xFF0B;</button>
      </div>
    </div>
  </div>

  <div id="panelOverlay" class="panel-overlay hidden"></div>

  <!-- Downloads -->
  <div id="panelDownloads" class="panel hidden">
    <div class="panel-header">
      <div class="panel-title" data-i18n="downloads">Downloads</div>
      <div class="panel-actions">
        <button id="btnClearFinished" data-i18n="clearFinished">Clear finished</button>
        <button id="btnCloseDownloads" class="btn-icon">&#x2715;</button>
      </div>
    </div>
    <div id="downloadsList" class="list"></div>
  </div>

  <!-- Extensions -->
  <div id="panelExtensions" class="panel hidden">
    <div class="panel-header">
      <div class="panel-title" data-i18n="extensions">Extensions</div>
      <div class="panel-actions">
        <button id="btnImportExt" data-i18n="importJs">Import .js</button>
        <button id="btnImportZip" data-i18n="importZip">Import .zip</button>
        <button id="btnReloadExt" data-i18n="reload">Reload</button>
        <button id="btnCloseExtensions" class="btn-icon">&#x2715;</button>
      </div>
    </div>
    <div id="extensionsList" class="list"></div>
  </div>

  <!-- Settings -->
  <div id="panelSettings" class="panel hidden">
    <div class="panel-header">
      <div class="panel-title" data-i18n="settings">Settings</div>
      <div class="panel-actions">
        <button id="btnCloseSettings" class="btn-icon">&#x2715;</button>
      </div>
    </div>
    <div class="settings-body">
      <div class="setting-row">
        <label data-i18n="theme">Theme</label>
        <div class="setting-control">
          <button id="btnThemeDark" class="theme-btn" data-theme-val="dark">Dark</button>
          <button id="btnThemeLight" class="theme-btn" data-theme-val="light">Light</button>
        </div>
      </div>
      <div class="setting-row">
        <label data-i18n="language">Language</label>
        <div class="setting-control">
          <select id="selectLanguage" class="setting-select" aria-label="Language"></select>
        </div>
      </div>
      <div class="setting-row">
        <label data-i18n="homepage">Homepage</label>
        <div class="setting-control setting-control-wide">
          <input id="inputHomepage" type="text" spellcheck="false" placeholder="https://example.com" />
          <button id="btnSaveHomepage" data-i18n="save">Save</button>
        </div>
      </div>
      <div class="setting-row">
        <label data-i18n="sitePermissions">Site permissions</label>
        <div class="setting-control">
          <button id="btnClearPermissions" class="settings-secondary-btn" data-i18n="clearSavedPermissions">Clear saved permissions</button>
        </div>
      </div>
    </div>
  </div>

  <div id="permissionOverlay" class="permission-overlay hidden">
    <div id="permissionModal" class="permission-modal" role="dialog" aria-modal="true" aria-labelledby="permissionTitle">
      <div class="permission-header">
        <div>
          <div id="permissionTitle" class="permission-title"></div>
          <div id="permissionSite" class="permission-site"></div>
        </div>
      </div>
      <div class="permission-body">
        <div id="permissionMessage" class="permission-message"></div>
        <div class="permission-origin-row">
          <span id="permissionOriginLabel" class="permission-origin-label"></span>
          <span id="permissionOriginValue" class="permission-origin-value"></span>
        </div>
        <div id="permissionNote" class="permission-note hidden"></div>
        <label id="permissionRememberRow" class="permission-remember">
          <input id="permissionRemember" type="checkbox" />
          <span id="permissionRememberText"></span>
        </label>
        <div id="permissionSources" class="permission-sources hidden"></div>
      </div>
      <div class="permission-actions">
        <button id="btnPermissionDeny" class="permission-btn permission-btn-secondary" type="button"></button>
        <button id="btnPermissionAlwaysAllow" class="permission-btn permission-btn-secondary hidden" type="button"></button>
        <button id="btnPermissionAllow" class="permission-btn permission-btn-primary" type="button"></button>
      </div>
    </div>
  </div>

  <script src="./i18n.js"></script>
  <script src="./renderer.js"></script>
</body>
</html>
